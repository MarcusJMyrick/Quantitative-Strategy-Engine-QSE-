name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install pinned formatters
        run: pip install clang-format==18.1.8 black==25.1.0 flake8==7.2.0

      - name: clang-format (C++)
        run: |
          find include src tests/cpp scripts/testing \( -name '*.cpp' -o -name '*.h' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror

      - name: black (Python)
        run: black --check scripts tests/python

      - name: flake8 (Python error classes)
        run: flake8 scripts tests/python

  tidy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (with Eigen submodule)
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y -V ca-certificates lsb-release wget pkg-config \
            build-essential cmake \
            libprotobuf-dev protobuf-compiler \
            libzmq3-dev libyaml-cpp-dev
          wget -q "https://packages.apache.org/artifactory/arrow/$(lsb_release --id --short | tr 'A-Z' 'a-z')/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb"
          sudo apt-get install -y -V "./apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb"
          sudo apt-get update
          sudo apt-get install -y -V libarrow-dev libparquet-dev

      - name: Install pinned clang-tidy
        run: pip install clang-tidy==18.1.8

      - name: Configure and build (generates protobuf headers)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build build --target qse -j"$(nproc)"

      - name: Run clang-tidy gate
        run: scripts/run_clang_tidy.sh

  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout (with Eigen submodule)
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y -V ca-certificates lsb-release wget pkg-config \
            build-essential cmake \
            libprotobuf-dev protobuf-compiler \
            libzmq3-dev libyaml-cpp-dev
          # Apache Arrow + Parquet come from the official Arrow apt repository
          wget -q "https://packages.apache.org/artifactory/arrow/$(lsb_release --id --short | tr 'A-Z' 'a-z')/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb"
          sudo apt-get install -y -V "./apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb"
          sudo apt-get update
          sudo apt-get install -y -V libarrow-dev libparquet-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 120
